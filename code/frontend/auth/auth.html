<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMap - Login</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-page">
        <!-- Theme Toggle -->
        <div class="auth-theme-toggle">
            <button class="theme-toggle-btn" id="header-theme-toggle">
                <svg class="icon">
                    <use href="../assets/icons.svg#moon"></use>
                </svg>
            </button>
        </div>

        <div class="auth-branding">
            <div class="auth-branding-content">
                <a class="auth-branding-logo animate-float" href="../landing/home.html" aria-label="Home">
                    <svg class="icon" style="width: 4rem; height: 4rem;">
                        <use href="../assets/icons.svg#graduation-cap"></use>
                    </svg>
                </a>
                <a href="../landing/home.html" class="auth-branding-title" style="display:inline-block; color: inherit; text-decoration: none;">StudyMap</a>
                <p class="auth-branding-subtitle">Transform your syllabus into an interactive learning journey</p>
                <div class="auth-branding-features">
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Upload your curriculum PDF</span>
                    </div>
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Track topic-wise progress</span>
                    </div>
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Verify learning with MCQ tests</span>
                    </div>
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Unlock final mock exam</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper animate-slide-up">
                <a class="auth-mobile-logo" href="../landing/home.html" aria-label="Home">
                    <div class="auth-mobile-logo-icon">
                        <svg class="icon">
                            <use href="../assets/icons.svg#graduation-cap"></use>
                        </svg>
                    </div>
                    <span class="auth-mobile-logo-text">StudyMap</span>
                </a>

                <div class="glass-card auth-form">
                    <div class="auth-form-header">
                        <h2 class="auth-form-title" id="auth-title">Welcome back!</h2>
                        <p class="auth-form-subtitle" id="auth-subtitle">Enter your credentials to continue</p>
                    </div>

                    <form id="auth-form">
                        <div class="auth-form-group hidden" id="name-group">
                            <label class="label" for="name">Full Name</label>
                            <div class="input-with-icon">
                                <span class="input-icon">
                                    <svg class="icon icon-sm">
                                        <use href="../assets/icons.svg#user"></use>
                                    </svg>
                                </span>
                                <input type="text" id="name" class="input" placeholder="John Doe">
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label class="label" for="email">Email</label>
                            <div class="input-with-icon">
                                <span class="input-icon">
                                    <svg class="icon icon-sm">
                                        <use href="../assets/icons.svg#mail"></use>
                                    </svg>
                                </span>
                                <input type="email" id="email" class="input" placeholder="you@example.com" required>
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label class="label" for="password">Password</label>
                            <div class="input-with-icon">
                                <span class="input-icon">
                                    <svg class="icon icon-sm">
                                        <use href="../assets/icons.svg#lock"></use>
                                    </svg>
                                </span>
                                <input type="password" id="password" class="input" placeholder="••••••••" required
                                    minlength="6">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-gradient btn-lg" style="width: 100%;" id="auth-submit">
                            <span id="auth-btn-text">Sign In</span>
                            <span id="auth-btn-icon">
                                <svg class="icon">
                                    <use href="../assets/icons.svg#arrow-right"></use>
                                </svg>
                            </span>
                        </button>
                    </form>

                    <div class="auth-form-footer">
                        <span id="auth-toggle-text">Don't have an account?</span>
                        <button type="button" id="auth-toggle">Sign up</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../common/config.js"></script>
    <script src="../common/api.js"></script>
    <script src="../common/common.js"></script>
    <script src="auth.js"></script>
</body>

</html>
