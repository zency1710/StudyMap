<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMap - Reset Password</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="auth.css">
</head>

<body>
    <div class="auth-page">
        <!-- Theme Toggle -->
        <div class="auth-theme-toggle">
            <button class="theme-toggle-btn" id="header-theme-toggle">
                <svg class="icon">
                    <use href="../assets/icons.svg#moon"></use>
                </svg>
            </button>
        </div>

        <div class="auth-branding">
            <div class="auth-branding-content">
                <a class="auth-branding-logo animate-float" href="../landing/home.html" aria-label="Home">
                    <svg class="icon" style="width: 4rem; height: 4rem;">
                        <use href="../assets/icons.svg#graduation-cap"></use>
                    </svg>
                </a>
                <a href="../landing/home.html" class="auth-branding-title"
                    style="display:inline-block; color: inherit; text-decoration: none;">StudyMap</a>
                <p class="auth-branding-subtitle">Transform your syllabus into an interactive learning journey</p>
                <div class="auth-branding-features">
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Upload your curriculum PDF</span>
                    </div>
                    <div class="auth-branding-feature">
                        <div class="auth-branding-feature-dot"></div>
                        <span>Track topic-wise progress</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="auth-form-container">
            <div class="auth-form-wrapper animate-slide-up">
                <a class="auth-mobile-logo" href="../landing/home.html" aria-label="Home">
                    <div class="auth-mobile-logo-icon">
                        <svg class="icon">
                            <use href="../assets/icons.svg#graduation-cap"></use>
                        </svg>
                    </div>
                    <span class="auth-mobile-logo-text">StudyMap</span>
                </a>

                <div class="glass-card auth-form" id="reset-password-card">
                    <div class="auth-form-header">
                        <h2 class="auth-form-title">Set New Password</h2>
                        <p class="auth-form-subtitle">Please enter your new password below</p>
                    </div>

                    <form id="reset-password-form">
                        <div class="auth-form-group">
                            <label class="label" for="new-password">New Password</label>
                            <div class="input-with-icon">
                                <span class="input-icon">
                                    <svg class="icon icon-sm">
                                        <use href="../assets/icons.svg#lock"></use>
                                    </svg>
                                </span>
                                <input type="password" id="new-password" class="input" placeholder="••••••••" required
                                    minlength="6">
                            </div>
                        </div>

                        <div class="auth-form-group">
                            <label class="label" for="confirm-password">Confirm Password</label>
                            <div class="input-with-icon">
                                <span class="input-icon">
                                    <svg class="icon icon-sm">
                                        <use href="../assets/icons.svg#lock"></use>
                                    </svg>
                                </span>
                                <input type="password" id="confirm-password" class="input" placeholder="••••••••" required
                                    minlength="6">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-gradient btn-lg" style="width: 100%;" id="reset-submit">
                            <span id="reset-btn-text">Reset Password</span>
                            <span id="reset-btn-icon">
                                <svg class="icon">
                                    <use href="../assets/icons.svg#check"></use>
                                </svg>
                            </span>
                        </button>
                    </form>

                    <div class="auth-form-footer">
                        <a href="auth.html" style="color:var(--text-secondary); text-decoration:none; font-size:0.875rem;">&larr; Back to Login</a>
                    </div>
                </div>
                
                <div class="glass-card auth-form hidden" id="reset-success-card" style="display: none; text-align: center;">
                    <div class="auth-form-header">
                        <div style="width: 4rem; height: 4rem; border-radius: 50%; background: rgba(16, 185, 129, 0.1); color: rgb(16, 185, 129); display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem;">
                            <svg class="icon" style="width: 2rem; height: 2rem;">
                                <use href="../assets/icons.svg#check"></use>
                            </svg>
                        </div>
                        <h2 class="auth-form-title">Password Reset</h2>
                        <p class="auth-form-subtitle">Your password has been successfully reset.</p>
                    </div>
                    
                    <a href="auth.html" class="btn btn-gradient btn-lg" style="width: 100%; text-decoration: none; display: inline-block;">
                        Return to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
    
    <script src="../common/config.js"></script>
    <script src="../common/api.js"></script>
    <script src="../common/common.js"></script>
    <script src="reset-password.js"></script>
</body>

</html>
