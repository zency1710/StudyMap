<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyMap - Analytics</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../common/common.css">
    <link rel="stylesheet" href="analytics.css">
</head>

<body>
    <!-- Mobile Header -->
    <div class="mobile-header">
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <div class="auth-mobile-logo-icon"
                style="width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; background: var(--gradient-primary); border-radius: 0.5rem; color: white;">
                <svg class="icon">
                    <use href="../assets/icons.svg#graduation-cap"></use>
                </svg>
            </div>
            <span style="font-weight: 700;">StudyMap</span>
        </div>
        <div style="display: flex; align-items: center; gap: 0.5rem;">
            <button class="theme-toggle-btn" id="header-theme-toggle-mobile">
                <svg class="icon">
                    <use href="../assets/icons.svg#moon"></use>
                </svg>
            </button>
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg class="icon">
                    <use href="../assets/icons.svg#menu"></use>
                </svg>
            </button>
        </div>
    </div>

    <!-- Mobile Overlay -->
    <div class="mobile-overlay" id="mobile-overlay"></div>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo">
                <div style="display: flex; align-items: center; gap: 0.75rem; flex: 1;">
                    <div class="sidebar-logo-icon">
                        <svg class="icon">
                            <use href="../assets/icons.svg#graduation-cap"></use>
                        </svg>
                    </div>
                    <span class="sidebar-logo-text">StudyMap</span>
                </div>
                <button class="theme-toggle-btn desktop-only" id="header-theme-toggle">
                    <svg class="icon">
                        <use href="../assets/icons.svg#moon"></use>
                    </svg>
                </button>
            </div>

            <nav class="sidebar-nav">
                <a href="../dashboard/dashboard.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#home"></use>
                    </svg>
                    <span>Dashboard</span>
                </a>
                <a href="../upload/upload.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#upload"></use>
                    </svg>
                    <span>Upload PDF</span>
                </a>
                <a href="../syllabus/syllabus.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#book-open"></use>
                    </svg>
                    <span>Syllabus</span>
                </a>
                <a href="../streaks/streaks.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#flame"></use>
                    </svg>
                    <span>Streaks</span>
                </a>
                <a href="../final-exam/final-exam.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#trophy"></use>
                    </svg>
                    <span>Final Exam</span>
                </a>
                <a href="../analytics/analytics.html" class="sidebar-nav-item active">
                    <svg class="icon">
                        <use href="../assets/icons.svg#bar-chart"></use>
                    </svg>
                    <span>Analytics</span>
                </a>
                <a href="../settings/settings.html" class="sidebar-nav-item">
                    <svg class="icon">
                        <use href="../assets/icons.svg#settings"></use>
                    </svg>
                    <span>Settings</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <div class="sidebar-user">
                    <div class="sidebar-user-avatar">U</div>
                    <div class="sidebar-user-info">
                        <div class="sidebar-user-name">User Name</div>
                        <div class="sidebar-user-email">user@example.com</div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="context-banner-container"></div>
            <div class="analytics-container animate-fade-in">
                <div class="analytics-header">
                    <h1>Analytics</h1>
                    <p>Track your learning progress and performance</p>
                </div>

                <!-- Stats Grid -->
                <div class="stats-grid" id="stats-grid">
                    <!-- Injected by JS -->
                </div>

                <!-- Charts -->
                <div class="two-col-grid">
                    <!-- Subject Progress -->
                    <div class="glass-card analytics-chart">
                        <div class="analytics-chart-header">
                            <div class="analytics-chart-icon">
                                <svg class="icon">
                                    <use href="../assets/icons.svg#bar-chart"></use>
                                </svg>
                            </div>
                            <h2>Subject Progress</h2>
                        </div>
                        <div class="analytics-chart-placeholder" id="subject-progress-container">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <!-- Overall Completion -->
                    <div class="glass-card analytics-chart">
                        <div class="analytics-chart-header">
                            <div class="analytics-chart-icon">
                                <svg class="icon">
                                    <use href="../assets/icons.svg#target"></use>
                                </svg>
                            </div>
                            <h2>Overall Completion</h2>
                        </div>
                        <div style="display: flex; justify-content: center; padding: 2rem;"
                            id="overall-completion-container">
                            <!-- Injected by JS -->
                        </div>
                    </div>
                </div>

                <!-- Weekly Activity -->
                <div class="glass-card weekly-activity">
                    <div class="weekly-activity-header">
                        <div style="display: flex; align-items: center; gap: 0.5rem;">
                            <svg class="icon">
                                <use href="../assets/icons.svg#clock"></use>
                            </svg>
                            <h2 style="font-size: 1.125rem; font-weight: 600;">Weekly Activity</h2>
                        </div>
                        <div class="weekly-activity-streak">
                            <span id="weekly-streak-text">0 day streak</span>
                        </div>
                    </div>
                    <div class="weekly-activity-days" id="weekly-activity-days">
                        <!-- Injected by JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="../common/config.js"></script>
    <script src="../common/api.js"></script>
    <script src="../common/common.js"></script>
    <script src="analytics.js"></script>
</body>

</html>
